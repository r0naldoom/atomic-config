# Distrobox containers configuration
# Usage: distrobox assemble create --file distrobox.ini

[arch]
image=archlinux:latest
nvidia=true
pull=true
init=false
home=~
additional_packages="
    base-devel
    git
    git-lfs

    neovim
    tree-sitter
    tree-sitter-cli

    starship
    zoxide
    fzf
    bat
    eza

    btop
    fastfetch
    ripgrep
    fd
    duf
    tldr
    jq
    yq
    wget
    rsync
    meld

    github-cli
    lazygit

    sesh
    tmux
    rmpc

    yazi
    ffmpegthumbnailer
    p7zip
    poppler

    lua-language-server
    bash-language-server
    yaml-language-server
    stylua
    shfmt

    gcc
    make
    cmake
    pkg-config
    direnv

    python
    python-pip
    uv
    rustup
    go
    nodejs
    npm
    lua
    luarocks

    aspell
    aspell-pt
    aspell-en
"

[msvc]
# Container para builds Windows com MSVC via Wine
# Uso: distrobox enter msvc
# Build: cmake -B build -DCMAKE_TOOLCHAIN_FILE=toolchain-linux-msvc-x86.cmake
image=fedora:latest
nvidia=false
pull=true
init=false
home=~
additional_packages="
    wine
    winetricks
    msitools
    cabextract
    samba-winbind
    python3
    ca-certificates

    cmake
    ninja-build
    make
    git
"
