# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: r0naldoom
description: Hyprland workstation with NVIDIA - Minimal base
base-image: ghcr.io/ublue-os/silverblue-nvidia
image-version: latest

modules:
  - type: script
    scripts:
      - copr-repos.sh

  - type: rpm-ostree
    install:
      # ─────────────────────────────────────────────────────────────────────────
      # HYPRLAND & COMPOSITOR
      # ─────────────────────────────────────────────────────────────────────────
      - hyprland
      - xorg-x11-server-Xwayland
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - hypridle
      - hyprlock
      - hyprpaper
      - greetd
      - tuigreet

      # ─────────────────────────────────────────────────────────────────────────
      # BAR & THEMING
      # ─────────────────────────────────────────────────────────────────────────
      - noctalia-shell
      - adw-gtk3-theme
      # - bibata-cursor-themes  # needs COPR
      - nwg-look
      - qt5ct
      - qt6ct

      # ─────────────────────────────────────────────────────────────────────────
      # WAYLAND TOOLS
      # ─────────────────────────────────────────────────────────────────────────
      - grim
      - slurp
      - satty
      - wl-clipboard
      - cliphist
      - swww
      - swayosd
      # - wl-color-picker  # needs COPR
      - brightnessctl
      - playerctl
      # - fnott  # needs COPR, use mako instead
      - mako
      - libnotify
      - wev

      # ─────────────────────────────────────────────────────────────────────────
      # TERMINAL & SHELL (Base)
      # ─────────────────────────────────────────────────────────────────────────
      - ghostty
      - fish
      - tmux

      # ─────────────────────────────────────────────────────────────────────────
      # FILE MANAGERS
      # ─────────────────────────────────────────────────────────────────────────
      - thunar
      - thunar-volman
      - thunar-archive-plugin
      - tumbler
      - udiskie

      # ─────────────────────────────────────────────────────────────────────────
      # AUDIO
      # ─────────────────────────────────────────────────────────────────────────
      - pipewire
      - pipewire-alsa
      - pipewire-pulseaudio
      - pipewire-jack-audio-connection-kit
      - wireplumber
      - pavucontrol

      # ─────────────────────────────────────────────────────────────────────────
      # BLUETOOTH
      # ─────────────────────────────────────────────────────────────────────────
      - bluez
      - blueman

      # ─────────────────────────────────────────────────────────────────────────
      # MUSIC
      # ─────────────────────────────────────────────────────────────────────────
      - cava

      # ─────────────────────────────────────────────────────────────────────────
      # BROWSER
      # ─────────────────────────────────────────────────────────────────────────
      - zen-browser

      # ─────────────────────────────────────────────────────────────────────────
      # MEDIA
      # ─────────────────────────────────────────────────────────────────────────
      - mpv
      - vlc
      - transmission-qt

      # ─────────────────────────────────────────────────────────────────────────
      # FONTS
      # ─────────────────────────────────────────────────────────────────────────
      - jetbrains-mono-fonts-all
      - fira-code-fonts
      - dejavu-fonts-all
      - liberation-fonts
      - open-sans-fonts
      - google-noto-fonts-common
      - google-noto-cjk-fonts-common
      - google-noto-emoji-fonts

      # ─────────────────────────────────────────────────────────────────────────
      # POLKIT & AUTH
      # ─────────────────────────────────────────────────────────────────────────
      - polkit
      - lxpolkit
      - gnome-keyring
      - seahorse

      # ─────────────────────────────────────────────────────────────────────────
      # NETWORKING
      # ─────────────────────────────────────────────────────────────────────────
      - NetworkManager
      - NetworkManager-wifi
      - NetworkManager-tui
      - iwd
      - firewalld

      # ─────────────────────────────────────────────────────────────────────────
      # VIRTUALIZATION (Base)
      # ─────────────────────────────────────────────────────────────────────────
      - podman-compose
      - virt-manager
      - libvirt
      - qemu-kvm
      - swtpm

      # ─────────────────────────────────────────────────────────────────────────
      # FILESYSTEM
      # ─────────────────────────────────────────────────────────────────────────
      - ntfs-3g
      - exfatprogs

      # ─────────────────────────────────────────────────────────────────────────
      # UTILITIES (System)
      # ─────────────────────────────────────────────────────────────────────────
      - p7zip
      - p7zip-plugins
      - unrar
      - unzip
      - upower
      - android-tools

    remove:
      - firefox
      - firefox-langpacks

  - type: files
    files:
      - source: etc
        destination: /etc

  - type: script
    scripts:
      - setup-system.sh
