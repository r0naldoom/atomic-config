# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# LOOK & FEEL
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 7
        passes = 4
        ignore_opacity = true
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
        xray = false
        popups = true
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    focus_on_activate = true
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WINDOW RULES - OPACITY
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Default: 95% focused, 90% unfocused
windowrule = opacity 0.95 0.9, match:class .*

# Browsers: 100% focused, 95% unfocused
windowrule = opacity 1 0.95, match:class ^(firefox|zen|librewolf|chromium|google-chrome|brave).*$

# Video sites: always 100%
windowrule = opacity 1.0 1.0, match:title ^.*(YouTube|Netflix|Prime Video|Twitch).*$

# Steam: always 100%
windowrule = opacity 1 1, match:class steam

# Picture-in-Picture: always 100%
windowrule = opacity 1 1, match:title (Picture.?in.?[Pp]icture)

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# LAYER RULES - BLUR
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Rofi
layerrule = match:namespace rofi, blur on
layerrule = match:namespace rofi, ignore_alpha 0

# Waybar
layerrule = match:namespace waybar, blur on
layerrule = match:namespace waybar, ignore_alpha 0

# SwayOSD
layerrule = match:namespace swayosd, blur on
layerrule = match:namespace swayosd, ignore_alpha 0

# Noctalia Shell
layerrule = match:namespace noctalia-background-.*, blur on
layerrule = match:namespace noctalia-background-.*, blur_popups on
layerrule = match:namespace noctalia-background-.*, ignore_alpha 0.5
