# WINDOW RULES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# https://wiki.hyprland.org/Configuring/Window-Rules/

# Prevent apps from auto-maximizing
windowrule = suppress_event maximize, match:class .*

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# FLOATING WINDOWS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Common dialogs
windowrule {
    name = float_dialogs
    match:title = ^(Open File|Choose Files|Save As|Confirm to replace files|File Operation Progress)$
    float = true
    center = true
}

# Utilities
windowrule {
    name = float_utilities
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|qt5ct|qt6ct|nwg-look)$
    float = true
    center = true
}

# Picture-in-Picture
windowrule {
    name = pip
    match:title = (Picture.?in.?[Pp]icture)
    float = true
    pin = true
    size = 600 338
    keep_aspect_ratio = true
    border_size = 0
    move = 100%-w-40 4%
}

# Steam
windowrule = float on, match:class steam
windowrule = center on, match:class steam, match:title Steam
windowrule = size 1100 700, match:class steam, match:title Steam
windowrule = idle_inhibit fullscreen, match:class steam
