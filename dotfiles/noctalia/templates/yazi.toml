# thorn theme for Yazi
# Teal escuro, green accent, corais quentes

# === Base colors ===
# bg: {{colors.surface.default.hex}} | fg: {{colors.on_surface.default.hex}} | cursorline: {{colors.surface_variant.default.hex}} | statusbar: {{colors.outline.default.hex}}
# gray: {{colors.on_surface_variant.default.hex}} | green: {{colors.primary.default.hex}} | yellow: {{colors.secondary.default.hex}} | blue: {{colors.tertiary.default.hex}}
# red: {{colors.error.default.hex}} | pink: {{colors.tertiary.default.hex}} | cyan: {{colors.secondary.default.hex}} | orange: {{colors.error.default.hex}}

cwd = { fg = "{{colors.on_surface_variant.default.hex}}", italic = true }

# Hovered
hovered         = { bg = "{{colors.surface_variant.default.hex}}" }
preview_hovered = { bg = "{{colors.surface_variant.default.hex}}" }

# Find
find_keyword  = { fg = "{{colors.surface.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }
find_position = { fg = "{{colors.tertiary.default.hex}}", bg = "{{colors.surface_variant.default.hex}}", bold = true }

# Marker
marker_copied   = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
marker_cut      = { fg = "{{colors.error.default.hex}}", bg = "{{colors.error.default.hex}}" }
marker_marked   = { fg = "{{colors.tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}" }
marker_selected = { fg = "{{colors.tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}" }

# Tabs - green accent (como ef-cherie usa rosa, tokyonight usa roxo)
[tabs]
active   = { fg = "{{colors.surface.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
inactive = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }
sep_inner  = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# Count
count_copied   = { fg = "{{colors.surface.default.hex}}", bg = "{{colors.primary.default.hex}}" }
count_cut      = { fg = "{{colors.surface.default.hex}}", bg = "{{colors.error.default.hex}}" }
count_selected = { fg = "{{colors.surface.default.hex}}", bg = "{{colors.tertiary.default.hex}}" }

# Border
border_symbol = "│"
border_style  = { fg = "{{colors.outline.default.hex}}" }

[mode]
normal_main = { fg = "{{colors.surface.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }
normal_alt  = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }

select_main = { fg = "{{colors.surface.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }
select_alt  = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }

unset_main  = { fg = "{{colors.surface.default.hex}}", bg = "{{colors.error.default.hex}}", bold = true }
unset_alt   = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_variant.default.hex}}" }

[status]
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

[which]
mask       = { bg = "{{colors.surface.default.hex}}" }
cand       = { fg = "{{colors.secondary.default.hex}}" }
rest       = { fg = "{{colors.on_surface_variant.default.hex}}" }
desc       = { fg = "{{colors.tertiary.default.hex}}" }
separator  = "  "

[input]
border = { fg = "{{colors.outline.default.hex}}" }

[indicator]
parent  = { reversed = true }
current = { reversed = true }
preview = { underline = true }
padding = { open = "", close = "" }

[flavor]
dark = "thorn"
