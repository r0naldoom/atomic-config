# Noctalia Starship — Noctalia
# Auto-generated by Noctalia. Do not edit manually.
# Matches tmux tab powerline style
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
[](fg:{{colors.primary.default.hex}})\
$os\
[](fg:{{colors.primary.default.hex}} bg:{{colors.surface_variant.default.hex}})\
$directory\
[](fg:{{colors.surface_variant.default.hex}} bg:{{colors.outline.default.hex}})\
$git_branch\
$git_status\
[](fg:{{colors.outline.default.hex}})\
$fill\
$python$nodejs$rust$golang$lua$java$dotnet$c\
$cmd_duration\
$line_break\
$character"""

[os]
disabled = false
style = "bg:{{colors.primary.default.hex}} fg:{{colors.on_primary.default.hex}} bold"
format = "[ $symbol ]($style)"

[os.symbols]
NixOS = "󱄅"
Arch = "✞"
EndeavourOS = "✞"
Linux = "✞"

[fill]
symbol = " "

[directory]
style = "bg:{{colors.surface_variant.default.hex}} fg:{{colors.on_surface.default.hex}} bold"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"~" = " ~"

[git_branch]
symbol = ""
style = "bg:{{colors.outline.default.hex}} fg:{{colors.on_surface.default.hex}}"
format = "[$symbol $branch ]($style)"

[git_status]
style = "bg:{{colors.outline.default.hex}} fg:{{colors.error.default.hex}}"
format = "[$all_status$ahead_behind ]($style)"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "~${count}"
staged = "+${count}"
untracked = "?${count}"

[character]
success_symbol = "[❯](bold {{colors.secondary.default.hex}})"
error_symbol = "[❯](bold {{colors.error.default.hex}})"
vimcmd_symbol = "[❮](bold {{colors.primary.default.hex}})"

[cmd_duration]
min_time = 2000
format = " [ $duration]($style)"
style = "fg:{{colors.on_surface_variant.default.hex}}"

[python]
symbol = ""
style = "fg:{{colors.tertiary.default.hex}}"
format = "[$symbol $version ]($style)"
detect_extensions = []
detect_files = ["pyproject.toml", "requirements.txt", "setup.py"]

[nodejs]
symbol = ""
format = "[$symbol $version ]($style)"
style = "fg:{{colors.primary.default.hex}}"
detect_extensions = []
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]

[rust]
symbol = ""
format = "[$symbol $version ]($style)"
style = "fg:{{colors.error.default.hex}}"

[golang]
symbol = ""
format = "[$symbol $version ]($style)"
style = "fg:{{colors.tertiary.default.hex}}"

[lua]
symbol = "裂"
format = "[$symbol $version ]($style)"
style = "fg:{{colors.tertiary.default.hex}}"

[java]
symbol = ""
format = "[$symbol $version ]($style)"
style = "fg:{{colors.error.default.hex}}"

[dotnet]
symbol = ""
format = "[$symbol $version ]($style)"
style = "fg:{{colors.secondary.default.hex}}"

[c]
symbol = "ﭰ"
format = "[$symbol $version ]($style)"
style = "fg:{{colors.tertiary.default.hex}}"
