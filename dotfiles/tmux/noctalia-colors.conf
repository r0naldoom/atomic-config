# thorn tmux theme
# Teal escuro, verdes frios, corais quentes

# === Base ===
set -g @fg0 "#DBD0C6"
set -g @bg0 "#152326"
set -g @bg_dim "#0F1A1C"

# === Tab ativa (green accent) ===
set -g @tab_active_num_bg "#6FA791"
set -g @tab_active_num_fg "#152326"
set -g @tab_active_name_bg "#1D3034"
set -g @tab_active_name_fg "#DBD0C6"

# === Tab inativa ===
set -g @tab_inactive_num_bg "#111F22"
set -g @tab_inactive_num_fg "#91A4AD"
set -g @tab_inactive_name_bg "#1D3034"
set -g @tab_inactive_name_fg "#91A4AD"

# === Status bar ===
set -g @status_bg "#1D3034"
set -g @status_fg "#DBD0C6"
set -g @status_secondary_bg "#111F22"
set -g @status_secondary_fg "#DBD0C6"

# === Mensagens ===
set -g @message_bg "#1D3034"
set -g @message_fg "#79C2B6"

# Extra colors from scheme JSON
set -g @hover "#79C2B6"
set -g @moutline "#38524F"
